<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game</title>
</head>
<body>

    <div id="start-menu" class="start-menu">
        <h1>Игра</h1>
        <div class="option">
            <div class="rules">
                <h1>Правила:</h1>
                <p>Вы Эльф, на вас нападают злобные Орки. Ваша задача - 
                как можно скорее добраться до финиша и убить всех Орков, встретившихся по пути. Вперед, отважный воин!</p>
            </div>
            <div class="control">
                <h1>Управление:</h1>
                <p><span class="key">A</span> / <span class="key">D</span> - Влево / Вправо</p>
                <p><span class="key_space">Пробел</span> - Прыжок</p>
                <p><span class="key">1</span> / <span class="key">3</span> / <span class="key">4</span> - Атака</p>
                <p><span class="key">2</span> - Щит</p>
            </div>
        </div>
        <label for="nickname">Твой ник:</label>
        <input type="text" id="nickname" placeholder="Введи никнейм (мин 3 символа)" maxlength="15">
        <button id="start-btn" disabled>Начать игру</button>    
    </div>

    <div class="game">
        <img src="img/tree.png" alt="" class="green">
        <canvas id="canvas" width="900" height="493"></canvas>
        <img src="img/tree.png" alt="" class="green">
    </div>


    <script src="cnt_tick.js" charset="UTF-8"></script>
    <script src="vuvod_startMenu.js" charset="UTF-8"></script>
    <script src="run_background.js" charset="UTF-8"></script>
    <script src="script.js" charset="UTF-8"></script>
    <script src="file_spriteRunner.js" charset="UTF-8"></script>
</body>
</html>
